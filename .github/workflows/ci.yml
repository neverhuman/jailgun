name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: bash ops/ci/rust.sh

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: bash ops/ci/node.sh

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: sudo apt-get update && sudo apt-get install -y ripgrep
      - run: bash ops/ci/security.sh # gitleaks detect dependency-review npm audit cargo audit
      - uses: actions/dependency-review-action@v4
        if: github.event_name == 'pull_request'

  e2e:
    needs: [rust, node]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: sudo apt-get update && sudo apt-get install -y python3
      - run: bash ops/ci/e2e.sh
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-artifacts
          path: |
            artifacts/

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Jankurai
        run: cargo install --git https://github.com/neverhuman/jankurai.git --rev 34608d016de5fd24e677244112941d240ca00188 --locked --force
      - run: bash ops/ci/jankurai.sh # jankurai audit agent/repo-score.json agent/repo-score.md
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jankurai-audit
          path: |
            agent/repo-score.json
            agent/repo-score.md
            agent/jankurai-badge.svg
            agent/jankurai-badge.json
